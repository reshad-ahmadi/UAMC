services:
  - type: web
    name: uamc-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_URL
        sync: false   # Set this manually in Render dashboard
      - key: DB_SSL
        value: "true"
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL e.g. https://uamc.vercel.app
